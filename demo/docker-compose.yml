services:
  opensearch:
    image: opensearchproject/opensearch:3.6.0
    container_name: smart-agent-opensearch
    environment:
      - discovery.type=single-node
      - DISABLE_SECURITY_PLUGIN=true
      - OPENSEARCH_JAVA_OPTS=-Xms1g -Xmx1g
    ports:
      - "9200:9200"
    volumes:
      - opensearch-data:/usr/share/opensearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  indexer:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: smart-agent-indexer
    command: uvicorn indexer.main:app --host 0.0.0.0 --port 8001 --reload
    ports:
      - "8001:8001"
    volumes:
      - ./uploads:/app/uploads
      - .:/app
      - ../domain_type.md:/app/domain_type.md:ro
      - ../document_type.md:/app/document_type.md:ro
    environment:
      - OPENSEARCH_HOST=opensearch
      - OPENSEARCH_PORT=9200
      - LLM_URL=http://112.163.62.170:8012/v1
      - LLM_API_KEY=3c035ed9e73c0453a0b0dabe54823ca095857f77a87dfea5b5f50013f18320d9
      - LLM_MODEL=Qwen2.5-3B-Instruct
      - EMBEDDING_URL=http://112.163.62.170:8032/v1
      - EMBEDDING_MODEL=Qwen/Qwen3-Embedding-0.6B
      - EMBEDDING_DIM=1024
    depends_on:
      opensearch:
        condition: service_healthy

  searcher:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: smart-agent-searcher
    command: uvicorn searcher.main:app --host 0.0.0.0 --port 8002 --reload
    ports:
      - "8002:8002"
    volumes:
      - .:/app
      - ../domain_type.md:/app/domain_type.md:ro
      - ../document_type.md:/app/document_type.md:ro
    environment:
      - OPENSEARCH_HOST=opensearch
      - OPENSEARCH_PORT=9200
      - LLM_URL=http://112.163.62.170:8012/v1
      - LLM_API_KEY=3c035ed9e73c0453a0b0dabe54823ca095857f77a87dfea5b5f50013f18320d9
      - LLM_MODEL=Qwen2.5-3B-Instruct
      - EMBEDDING_URL=http://112.163.62.170:8032/v1
      - EMBEDDING_MODEL=Qwen/Qwen3-Embedding-0.6B
      - EMBEDDING_DIM=1024
    depends_on:
      opensearch:
        condition: service_healthy

  ui:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: smart-agent-ui
    command: streamlit run ui/app.py --server.port 8501 --server.address 0.0.0.0
    ports:
      - "8501:8501"
    volumes:
      - .:/app
    environment:
      - INDEXER_URL=http://indexer:8001
      - SEARCHER_URL=http://searcher:8002
    depends_on:
      - indexer
      - searcher

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    container_name: smart-agent-minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 10

  postgres:
    image: postgres:16.13
    container_name: smart-agent-postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=parser
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  opensearch-data:
  minio-data:
  postgres-data:
